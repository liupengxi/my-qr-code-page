<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>售后服务 - 联系我们</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(180deg, #1e3a5f 0%, #2d5a87 50%, #4a90c2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 24px 20px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            padding: 32px 28px 36px;
            max-width: 380px;
            width: 100%;
            text-align: center;
        }
        
        .logo-container {
            width: 250px;
            height: 150px;
            margin: 0 auto 20px;
        }
        
        .logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        
        .subtitle {
            margin: -50px 0 50px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        
        .service-hours {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 20px 18px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.25);
            cursor: pointer;
        }
        
        .service-hours:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .service-hours .phone-icon {
            width: 24px;
            height: 24px;
            fill: white;
        }
        
        .service-hours .phone-text {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .wechat-section {
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .wechat-btn {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 20px 18px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.25);
            cursor: pointer;
        }
        
        .wechat-btn .wechat-icon {
            width: 24px;
            height: 24px;
            fill: white;
        }
        
        .wechat-btn .wechat-text {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .wechat-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Logo -->
    <div class="logo-container">
        <img src="logo2.png" alt="品牌 Logo" class="logo">
    </div>
    
    <!-- 副标题 -->
    <p class="subtitle">专业维修服务 · 快速响应 · 品质保障</p>
    
    <!-- 服务热线 -->
    <a href="tel:+8617398396981" class="service-hours">
        <svg class="phone-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
        </svg>
        <span class="phone-text">拨打客服热线</span>
    </a>
    
    <!-- 微信客服 -->
    <div class="wechat-section">
        <a href="weixin://" class="wechat-btn">
            <svg class="wechat-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M8.5 10.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5-1.5-.67-1.5-1.5.67-1.5 1.5-1.5zm5 0c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5-1.5-.67-1.5-1.5.67-1.5 1.5-1.5zm5 0c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5-1.5-.67-1.5-1.5.67-1.5 1.5-1.5zM12 2C6.48 2 2 5.76 2 10.4c0 2.52 1.32 4.8 3.46 6.38-.17.79-.54 2.1-1.01 2.62-.08.09-.02.27.12.24 1.96-.41 3.38-1.09 4.34-1.62.97.27 2.01.42 3.09.42 5.52 0 10-3.76 10-8.4S17.52 2 12 2z"/>
            </svg>
            <span class="wechat-text">添加微信客服</span>
        </a>
    </div>
</div>

</body>
</html>
